<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieX</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="popup" class="popup">

    <div class="popup-box">

        <img src="wk.png" class="popup-logo">

        <div class="popup-buttons">

            <button id="unlockBtn">Unlock</button>

            <button id="closeBtn">Close</button>

        </div>

    </div>

</div>
<header>

    <div class="logo">
        <span class="line line1"></span>

        <h1>xMoviex</h1>

        <span class="line line2"></span>
    </div>
  
   <!-- From Uiverse.io by satyamchaudharydev --> 
<button class="button" onclick="window.location.href='pages/Index.html'">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 24">
    <path d="m18 0 8 12 10-8-4 20H4L0 4l10 8 8-12z"></path>
  </svg>
  Unlock Pro
</button>

    
    <input
        type="text"
        id="searchBox"
        placeholder="🔍 Search Movie..."
    >

</header>

<main>

    <!-- Video List -->
    <div id="videoList"></div>

    <!-- Movie Not Found -->
    <div id="notFound" style="display:none; text-align:center; padding:20px;">

        <h2>Movie Not Found 😔</h2>

      <video
    id="notFoundVideo"
    width="100%"
    poster="thumbnails/notfound.jpg"
    autoplay
    loop
    playsinline
    controls
    controlsList="nodownload noplaybackrate"
    disablePictureInPicture>
    <source src="videos/notfound.mp4" type="video/mp4">
</video>

        <br><br>

        <h3>Send Your Movie Name</h3>

        <input
            type="text"
            id="movieRequest"
            placeholder="Enter Movie Name"
        >

        <button id="sendBtn">
            Send
        </button>

</div>

</main>

<script src="script.js"></script>

</body>

</html>
