<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skeleton Loading</title>

<style>
body{
    margin:0;
    padding:20px;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
}

/* Common Skeleton Animation */
.skeleton{
    background:linear-gradient(90deg,#eeeeee 25%,#dddddd 50%,#eeeeee 75%);
    background-size:200% 100%;
    animation:shimmer 1.5s infinite;
}

@keyframes shimmer{
    0%{background-position:200% 0;}
    100%{background-position:-200% 0;}
}

/* Profile Card */
.profile-card{
    display:flex;
    align-items:center;
    padding:20px;
    border:1px solid #eee;
    border-radius:8px;
    background:white;
    max-width:400px;
    width:100%;
    box-sizing:border-box;
}

.skeleton-avatar{
    width:60px;
    height:60px;
    border-radius:50%;
    margin-right:16px;
    flex-shrink:0;
}

.skeleton-content{
    flex:1;
}

.skeleton-name{
    height:18px;
    width:120px;
    margin-bottom:8px;
    border-radius:4px;
}

.skeleton-title{
    height:14px;
    width:90px;
    border-radius:4px;
}

/* Article Card */
.article-card{
    padding:10px;
    border-radius:8px;
    background:white;
    border:1px solid #eee;
    max-width:400px;
    width:100%;
    box-sizing:border-box;
}

.skeleton-image{
    width:100%;
    height:200px;
    margin-bottom:16px;
    border-radius:6px;
}

.skeleton-headline{
    height:24px;
    width:85%;
    margin-bottom:16px;
    border-radius:4px;
}

.skeleton-text{
    height:16px;
    width:100%;
    margin-bottom:8px;
    border-radius:4px;
}

.skeleton-text.short{
    width:65%;
}
.rajibx-skeleton{
    width:370px;
    height:230px;
    margin:40px auto 0;
    border-radius:4px;
    position:relative;
}

.rajibx-skeleton::after{
    content:"RAJIBX";
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:20px;
    font-weight:bold;
    letter-spacing:3px;
    color:#ffffff;
}
</style>
</head>

<body>

<!-- Top Profile Skeleton -->
<div class="profile-card">
    <div class="skeleton skeleton-avatar"></div>
    <div class="skeleton-content">
        <div class="skeleton skeleton-name"></div>
        <div class="skeleton skeleton-title"></div>
    </div>
</div>


<!-- Article Skeleton -->
<div class="article-card">
    <div class="skeleton skeleton-image"></div>
    <div class="skeleton skeleton-headline"></div>
    <div class="skeleton skeleton-text"></div>
    <div class="skeleton skeleton-text"></div>
    <div class="skeleton skeleton-text short"></div>
</div>
    <div class="rajibx-skeleton skeleton"></div>

<style>
body{
    opacity:1;
    transition:opacity .8s ease;
}

body.fade-out{
    opacity:0;
}
</style>

<script>
setTimeout(function () {
    document.body.classList.add("fade-out");

    setTimeout(function () {
        window.open(
            "https://u.pcloud.link/publink/show?code=XZ6zor5Z9UshU0I7dtR27aFr0qqrFYoNr6Ry",
            "_blank"
        );
    }, 800); // Fade animation complete hone ke baad
}, 3000);
</script>
</body>
</html>    font-size:60px;
    font-family:Arial,sans-serif;
    font-weight:900;
    margin:0;
}

.line{
    position:absolute;
    height:6px;
    background:#d40000;
    border-radius:10px;
}

.top{
    width:80px;
    top:20px;
    left:37%;
}

.bottom{
    width:80px;
    bottom:20px;
    right:37%;
}

/* 👆 YAHAN TAK */
</style>

</head>
<body>

<div class="banner">

        <span class="line top"></span>

</div>

</html>
