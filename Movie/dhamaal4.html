<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Glass Overlay</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

iframe{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
}

.banner{
    position:fixed;
    top:0px;
    left:50%;
    transform:translateX(-50%);
    width:min(9280px,200vw);
    height:120px;

    backdrop-filter:blur(25px) saturate(180%);
    -webkit-backdrop-filter:blur(25px) saturate(180%);

    background:rgba(255,255,255,.15);
    border:1px solid rgba(255,255,255,.3);

    border-radius:30px;

    box-shadow:
    0 10px 40px rgba(0,0,0,.35),
    inset 0 1px 1px rgba(255,255,255,.5);

    display:flex;
    align-items:center;
    justify-content:center;

    color:#fff;
    font-size:42px;
    font-family:Arial,sans-serif;
    z-index:9999;
}
.banner{
    position:fixed;
    top:0px;
    left:50%;
    transform:translateX(-50%);
    width:min(9280px,200vw);
    height:120px;

    backdrop-filter:blur(25px) saturate(180%);
    -webkit-backdrop-filter:blur(25px) saturate(180%);

    border-radius:30px;

    box-shadow:
    0 10px 40px rgba(0,0,0,.35),
    inset 0 1px 1px rgba(255,255,255,.5);

    display:flex;
    align-items:center;
    justify-content:center;

    color:#fff;
    font-size:42px;
    font-family:Arial,sans-serif;
    z-index:9999;
}

/* 👇 YAHAN SE PASTE KARO */

.logo{
    position:relative;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.logo h1{
    color:#000;
    font-size:60px;
    font-family:Arial,sans-serif;
    font-weight:900;
    margin:0;
}

.line{
    position:absolute;
    height:6px;
    background:#d40000;
    border-radius:10px;
}

.top{
    width:80px;
    top:20px;
    left:37%;
}

.bottom{
    width:80px;
    bottom:20px;
    right:37%;
}

/* 👆 YAHAN TAK */
</style>

</head>
<body>

<div class="banner">
    <div class="logo">
        <span class="line top"></span>
        <h1>xmoviex</h1>
        <span class="line bottom"></span>
    </div>
</div>

<iframe src="https://pixeldrain.com/u/vrbbddnu"></iframe>

</body>
</html>
